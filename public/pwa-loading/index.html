<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Minecraft Share - Launching</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- 主题色（明/暗） -->
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0b0f0c" media="(prefers-color-scheme: dark)" />

  <style>
    :root {
      --bg: #ffffff;
      --fg: #1f1f1f;
      --muted: #555;
      --muted-2: #888;
      --brand: #007a08;
      --btn-fg: #ffffff;
      --btn-bg: #007a08;
      --btn-bg-hover: #006507;
      --ring: #e5e5e5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0f0c;
        --fg: #e6e6e6;
        --muted: #c9c9c9;
        --muted-2: #9aa09a;
        --brand: #31c14a;
        --btn-fg: #0b0f0c;
        --btn-bg: #31c14a;
        --btn-bg-hover: #25a33b;
        --ring: #1e1f1e;
      }
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .wrap { text-align: center; padding: 16px; }

    .logo {
      width: 160px; height: 160px; object-fit: cover;
      border-radius: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }

    /* 更慢淡入 */
    .fade {
      opacity: 0;
      transition: opacity .9s ease;
      will-change: opacity;
    }
    .fade.show { opacity: 1; }

    /* 容器显隐用 visibility+opacity（避免 display:none 导致无动画） */
    .delayed {
      visibility: hidden;
      opacity: 0;
      transition: opacity .5s ease;
    }
    .delayed.show {
      visibility: visible;
      opacity: 1;
    }

    .spinner {
      margin: 12px auto;
      width: 36px; height: 36px;
      border: 4px solid var(--ring);
      border-top: 4px solid var(--brand);
      border-radius: 50%;
      animation: spin 1.1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    h1 {
      margin: 14px 0 6px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    p { margin: 10px 0; }
    .muted { color: var(--muted); }
    .muted-2 { color: var(--muted-2); }

    .btn {
      margin-top: 20px; padding: 8px 16px; font-size: 14px;
      border: none; border-radius: 8px;
      background-color: var(--btn-bg); color: var(--btn-fg);
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }
    .btn:hover { background-color: var(--btn-bg-hover); }

    /* 尊重“减少动态效果”设置 */
    @media (prefers-reduced-motion: reduce) {
      .fade, .delayed { transition: none !important; }
      .spinner { animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="/images/Homepage_Gameplay-Trailer_MC-OV-logo_300x300.png" alt="App logo" class="logo fade show" />
    <h1 class="fade show">Welcome to MC Share</h1>

    <!-- 延迟显示区（3s 后出现） -->
    <div id="delayedPart" class="delayed">
      <p class="fade">Loading…</p>
      <div class="spinner fade"></div>
      <p class="fade muted-2">If no response, please check your network connection.</p>
      <!-- 按钮 5s 后才出现 -->
      <button id="delayedBtn" class="btn fade" style="visibility:hidden; opacity:0;"
              onclick="location.replace('/')">
        Click here to go to homepage
      </button>
    </div>
  </div>

  <!-- SW 注册托管 -->
  <script src="/javascript/register-sw.js" defer></script>

  <script>
    // === 时间轴 ===
    // T+2s：若 SW ready，才跳转
    // T+3s：显示 delayed 容器 + 子元素顺序淡入
    // T+5s：显示按钮（再淡入）

    // 跳转：需同时满足 waited2s & swReady
    let waited2s = false;
    let swReady = false;

    const goHome = () => {
      if (location.pathname !== '/' || location.search || location.hash) {
        location.replace('/');
      }
    };

    // T+2s 标记
    setTimeout(() => {
      waited2s = true;
      if (swReady) goHome();
    }, 2000);

    // 监听 SW ready / controllerchange（register-sw.js 会触发注册）
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.ready
        .then(() => { swReady = true; if (waited2s) goHome(); })
        .catch(() => { /* SW 失败则不跳 */ });

      navigator.serviceWorker.addEventListener('controllerchange', () => {
        swReady = true;
        if (waited2s) goHome();
      });
    }

    // T+3s：显示容器，并强制 reflow 后逐个淡入子元素，防止过渡被吞
    setTimeout(() => {
      const delayed = document.getElementById('delayedPart');
      delayed.classList.add('show');

      // 先确保子元素处于起始态
      const fades = delayed.querySelectorAll('.fade');
      fades.forEach(el => el.classList.remove('show'));

      // 强制一次重排，确保浏览器应用起始样式
      void delayed.offsetHeight;

      // 依次淡入
      fades.forEach((el, i) => {
        setTimeout(() => el.classList.add('show'), i * 220);
      });
    }, 3000);

    // T+5s：显示按钮（用 visibility+opacity，有过渡）
    setTimeout(() => {
      const btn = document.getElementById('delayedBtn');
      btn.style.visibility = 'visible';
      // 强制 reflow 再加 show，确保过渡触发
      void btn.offsetHeight;
      btn.classList.add('show');
    }, 5000);
  </script>
</body>
</html>
