<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Minecraft Share - Launching</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- 主题色：随系统明暗自动切换 -->
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0b0f0c" media="(prefers-color-scheme: dark)" />

  <!-- 兜底跳转：3秒 后强制回到 / -->
  <meta http-equiv="refresh" content="30;url=/" />

  <style>
    :root {
      --bg: #ffffff;
      --fg: #1f1f1f;
      --muted: #555;
      --muted-2: #888;
      --brand: #007a08;
      --btn-fg: #ffffff;
      --btn-bg: #007a08;
      --btn-bg-hover: #006507;
      --ring: #e5e5e5;
      --danger: #d00;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b0f0c;
        --fg: #e6e6e6;
        --muted: #c9c9c9;
        --muted-2: #9aa09a;
        --brand: #31c14a;
        --btn-fg: #0b0f0c;
        --btn-bg: #31c14a;
        --btn-bg-hover: #25a33b;
        --ring: #1e1f1e;
        --danger: #ff6b6b;
      }
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .wrap { text-align: center; padding: 16px; }

    .logo {
      width: 150px; height: 150px; object-fit: contain;
      filter: drop-shadow(0 2px 10px rgba(0,0,0,.05));
    }

    /* 统一淡入淡出 */
    .fade { opacity: 0; transition: opacity .5s ease; }
    .fade.show { opacity: 1; }

    /* 转圈 */
    .spinner {
      margin: 12px auto;
      width: 36px; height: 36px;
      border: 4px solid var(--ring);
      border-top: 4px solid var(--brand);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    p { margin: 10px 0; }
    .muted { color: var(--muted); }
    .muted-2 { color: var(--muted-2); }

    .btn {
      margin-top: 20px; padding: 8px 16px; font-size: 14px;
      border: none; border-radius: 8px;
      background-color: var(--btn-bg); color: var(--btn-fg);
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }
    .btn:hover { background-color: var(--btn-bg-hover); }

    .offline {
      margin-top: 14px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="/images/Homepage_Gameplay-Trailer_MC-OV-logo_300x300.png" alt="App logo" class="logo fade show" />
    <p class="fade muted">Loading…</p>
    <div class="spinner fade"></div>
    <p class="fade muted-2">If no response, please check your network connection.</p>
    <button class="btn fade" onclick="location.replace('/')">Click here to go to homepage</button>
    <div id="offlineTip" class="offline fade">You are currently offline.</div>
  </div>

  <!-- ✅ 把注册托管到公共脚本 -->
  <script src="/javascript/register-sw.js" defer></script>

  <script>
    // 顺序淡入
    document.querySelectorAll('.fade').forEach((el, i) => {
      setTimeout(() => el.classList.add('show'), i * 200);
    });

    // 仅显示离线提示，不改变行为
    const offlineTip = document.getElementById('offlineTip');
    function updateOnlineStatus() {
      offlineTip.classList.toggle('show', !navigator.onLine);
    }
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    // 只负责：等待 SW 就绪后跳转到 /
    (async () => {
      const goHome = () => {
        if (location.pathname !== '/' || location.search || location.hash) {
          location.replace('/');
        }
      };

      if ('serviceWorker' in navigator) {
        try {
          await navigator.serviceWorker.ready; // register-sw.js 会负责触发注册
          goHome();
        } catch {
          goHome();
        }
      } else {
        goHome();
      }
    })();
  </script>
</body>
</html>
